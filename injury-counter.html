<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Injury Records Page</title>
    <style type="text/css">
        body {
            background-color: rgba(252, 252, 252, 0.9);
        }
        p.MsoNormal {
            margin-bottom: .0001pt;
            font-size: 11.0pt;
            font-family: "Calibri","sans-serif";
            margin-left: 0in;
            margin-right: 0in;
            margin-top: 0in;
        }
        .style2 {
            font-family: Calibri;
        }
        .style5 {
            background-color: #FFFF99;
        }
        .style6 {
            background-color: #F6CEF5;
            color: rgb(255,0,0);
        }
        .style7 {
            text-decoration: underline;
            background-color: #00FFFF;
        }
        .style8 {
            background-color: #00FFFF;
        }
        .style9 {
            text-align: left; 
        }
        .contenttitle {
            font-family: Calibri, sans-serif;
            font-size: 11.0pt;
        }
    </style>
</head>
<body>
    <div>
        <span class="contenttitle"><span><br/></span></span>
        <img src="Green-Cross-Windmill.png" width="58" height="58" style="float: none;" alt="Logo" />
        &nbsp;
        <table border="0">
            <tbody class="style2">
                <tr>
                    <td valign="top" style="height: 13px;">
                        <span class="contenttitle"><strong>ARG BRADFORD: </strong></span>
                        <span class="contenttitle">It has been
                            <strong><span id="bradfordLWDI">0</span></strong>
                            &nbsp;days since the last Lost Workday Injury.</span>
                    </td>
                </tr>
                <tr>
                    <td valign="top" style="height: 6px;" class="style9">
                        <span class="contenttitle">It has been
                            <strong><span id="bradfordOSHA">0</span></strong>
                            &nbsp;days since the last OSHA Recordable Injury.</span>
                    </td>
                </tr>
                <tr>
                    <td valign="bottom" style="height: 13px;">
                        <span class="contenttitle"><strong>ARG SANDYVILLE: </strong></span>
                        <span class="contenttitle">It has been
                            <strong><span id="sandyvilleLWDI">0</span></strong>
                            &nbsp;days since the last Lost Workday Injury.</span>
                    </td>
                </tr>
                <tr>
                    <td valign="top" style="height: 6px;" class="style9">
                        <span class="contenttitle">It has been
                            <strong><span id="sandyvilleOSHA">0</span></strong>
                            &nbsp;days since the last OSHA Recordable Injury.</span>
                    </td>
                </tr>
            </tbody>
        </table>
        <p>&nbsp;</p>
    </div>

    <script type="text/javascript">
        // ============================================================
        // UPDATE THESE DATES when an incident occurs (YYYY-MM-DD format)
        // ============================================================
        var dates = {
            bradfordLWDI:     "2024-05-30",   // Bradford last Lost Workday Injury
            bradfordOSHA:     "2024-05-30",   // Bradford last OSHA Recordable
            sandyvilleLWDI:   "2017-05-18",   // Sandyville last Lost Workday Injury
            sandyvilleOSHA:   "2022-02-10"    // Sandyville last OSHA Recordable
        };
        // ============================================================

        function daysSince(dateStr) {
            var past = new Date(dateStr);
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var diff = Math.floor((today - past) / (1000 * 60 * 60 * 24));
            return diff;
        }

        document.getElementById("bradfordLWDI").textContent   = daysSince(dates.bradfordLWDI);
        document.getElementById("bradfordOSHA").textContent   = daysSince(dates.bradfordOSHA);
        document.getElementById("sandyvilleLWDI").textContent = daysSince(dates.sandyvilleLWDI);
        document.getElementById("sandyvilleOSHA").textContent = daysSince(dates.sandyvilleOSHA);
    </script>
</body>
</html>
