<body>
  <div>
    <div class="number" id="days">0</div>
    <div class="label">Days Without a Recordable Injury</div>
    <div class="since" id="since"></div>
  </div>
  <script>
    // ← CHANGE THIS DATE to your last incident date
    const lastIncident = new Date("2024-06-15");

    const today = new Date();
    const diff = Math.floor((today - lastIncident) / (1000 * 60 * 60 * 24));
    document.getElementById("days").textContent = diff;
    document.getElementById("since").textContent =
      "Since " + lastIncident.toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
  </script>
</body>
